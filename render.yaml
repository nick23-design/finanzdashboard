services:
  - type: web
    name: finanzdashboard-api
    runtime: python
    rootDir: finance-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false   # wird manuell im Render-Dashboard gesetzt (Vercel-URL)
