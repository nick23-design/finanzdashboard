<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #111827;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }
      #stage {
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
      }
      video {
        max-width: 100vw;
        max-height: 100vh;
        background: #000;
      }
      #label {
        position: fixed;
        left: 12px;
        top: 12px;
        background: rgba(0,0,0,.72);
        color: white;
        padding: 6px 8px;
        border-radius: 6px;
        font-size: 14px;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div id="label">loading</div>
    <div id="stage">
      <video id="video" muted playsinline preload="auto" src="./analysis.mp4"></video>
    </div>
    <script>
      const params = new URLSearchParams(location.search);
      const t = Number(params.get("t") || 0);
      const video = document.getElementById("video");
      const label = document.getElementById("label");

      function mark(text) {
        label.textContent = text;
        document.title = text;
      }

      video.addEventListener("loadedmetadata", () => {
        const target = Math.max(0, Math.min(t, Math.max(0, video.duration - 0.1)));
        mark(`t=${target.toFixed(1)}s / ${video.duration.toFixed(1)}s`);
        video.currentTime = target;
      });

      video.addEventListener("seeked", () => {
        video.pause();
        mark(`ready t=${video.currentTime.toFixed(1)}s / ${video.duration.toFixed(1)}s`);
        document.body.dataset.ready = "true";
      });

      video.addEventListener("error", () => {
        mark("video error");
      });
    </script>
  </body>
</html>
